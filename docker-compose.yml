services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount the local directory to support hot-reloading during development
      - .:/app
    environment:
      - ENV=development
    # Override the production command to run the Uvicorn development server with reload enabled
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
